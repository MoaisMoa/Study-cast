name: Backend Deploy to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'studycast/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  S3_BUCKET: studycast-backend-deploy-artifacts
  EC2_INSTANCE_ID: i-0ab162fff3b1514ab
  WAR_SOURCE: studycast/build/libs/studycast-0.0.1-SNAPSHOT.war
  S3_KEY: backend/app.war

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '23'

      - name: Build backend WAR
        working-directory: studycast
        run: ./gradlew clean build

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload WAR to S3
        run: |
          aws s3 cp "${WAR_SOURCE}" "s3://${S3_BUCKET}/${S3_KEY}"

      - name: Deploy on EC2 via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --region "${AWS_REGION}" \
            --instance-ids "${EC2_INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy StudyCast backend from GitHub Actions" \
            --parameters 'commands=[
              "set -e",
              "echo Deploy started",
              "/usr/local/bin/aws s3 cp s3://studycast-backend-deploy-artifacts/backend/app.war /tmp/app.war --region ap-northeast-2",
              "ls -lh /tmp/app.war",
              "cp /home/ubuntu/studycast/studycast/app.war /home/ubuntu/studycast/studycast/app.war.bak || true",
              "mv /tmp/app.war /home/ubuntu/studycast/studycast/app.war",
              "chown ubuntu:ubuntu /home/ubuntu/studycast/studycast/app.war",
              "systemctl restart studycast",
              "sleep 5",
              "systemctl is-active studycast",
              "echo Deploy finished"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: ${COMMAND_ID}"

          for i in {1..30}; do
            STATUS=$(aws ssm get-command-invocation \
              --region "${AWS_REGION}" \
              --command-id "${COMMAND_ID}" \
              --instance-id "${EC2_INSTANCE_ID}" \
              --query "Status" \
              --output text || true)

            echo "SSM status: ${STATUS}"

            if [ "${STATUS}" = "Success" ]; then
              aws ssm get-command-invocation \
                --region "${AWS_REGION}" \
                --command-id "${COMMAND_ID}" \
                --instance-id "${EC2_INSTANCE_ID}" \
                --query "StandardOutputContent" \
                --output text
              exit 0
            fi

            if [ "${STATUS}" = "Failed" ] || [ "${STATUS}" = "Cancelled" ] || [ "${STATUS}" = "TimedOut" ]; then
              aws ssm get-command-invocation \
                --region "${AWS_REGION}" \
                --command-id "${COMMAND_ID}" \
                --instance-id "${EC2_INSTANCE_ID}" \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi

            sleep 10
          done

          echo "SSM command did not finish in time"
          exit 1
