spring.application.name=studycast

spring.datasource.url=jdbc:postgresql://localhost:5432/studycast_db
spring.datasource.username=younghee
spring.datasource.password=12345678
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

mybatis.mapper-locations=classpath:mybatis/mapper/*.xml
mybatis.type-aliases-package=com.younghee.dto
mybatis.type-handlers-package=com.younghee.config.typehandler

spring.profiles.include=secret

# Access Token 유효 시간
# 30분 = 1000 * 60 * 30
jwt.access-token-validity-ms=1800000

# Refresh Token 유효 시간
# 7일 = 1000 * 60 * 60 * 24 * 7
jwt.refresh-token-validity-ms=604800000