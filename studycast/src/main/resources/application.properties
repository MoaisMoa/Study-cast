spring.application.name=studycast

# 기본 실행은 로컬
spring.profiles.active=local

# local 프로필로 실행할 때 secret 프로필도 같이 활성화
spring.profiles.group.local=secret

# CORS 허용 오리진 — SecurityConfig(CORS)와 AuthController(refresh의 Origin/Referer 검증)가 공유
app.allowed-origins=http://localhost:5173,https://study-cast-ten.vercel.app