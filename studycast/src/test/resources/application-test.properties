# ──────────────────────────────────────────────────────────────
# 테스트 전용 설정 파일
# - 실제 DB·메일·OAuth 연결 없이 테스트가 실행되도록 placeholder 값을 사용
# - 테스트가 끝나면 데이터가 자동으로 롤백되거나 메모리에서 사라짐
# ──────────────────────────────────────────────────────────────

# JWT 시크릿 — 실제 운영 값과 달라도 무관 (단위 테스트는 이 값을 직접 주입해서 사용)
jwt.secret=test-secret-key-for-unit-tests-only-not-real

# JWT 토큰 유효 시간 (테스트에서는 짧게 설정)
jwt.access-token-validity-ms=3600000
jwt.refresh-token-validity-ms=86400000

# 메일 — 실제 발송하지 않으므로 placeholder
spring.mail.host=smtp.test.com
spring.mail.port=587
spring.mail.username=test@test.com
spring.mail.password=test-password
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# 프론트 URL
app.frontend-url=http://localhost:5173
app.cookie-secure=false

# 스터디방 정책
study-room.max-users-limit=4
study-room.image.max-size=5242880
study-room.image.upload-dir=uploads/rooms
study-room.image.allowed-types=image/jpeg, image/png

# LiveKit — 테스트에서 사용 안 하므로 placeholder
livekit.url=wss://test.livekit.cloud
livekit.api-key=test-key
livekit.api-secret=test-secret
livekit.token-ttl-minutes=120

# 암호화 키 — 테스트용 (AES-256, 32바이트 base64)
token.encrypt-key=dGVzdC1lbmNyeXB0LWtleS0zMi1ieXRlcy10ZXN0

# Kakao — 테스트에서 실제 호출 안 함
kakao.admin-key=test-kakao-admin-key
spring.security.oauth2.client.registration.kakao.client-id=test-kakao-client-id
spring.security.oauth2.client.registration.kakao.client-secret=test-kakao-secret
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.kakao.scope=account_email,profile_nickname
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

# Google — 테스트에서 실제 호출 안 함
spring.security.oauth2.client.registration.google.client-id=test-google-client-id
spring.security.oauth2.client.registration.google.client-secret=test-google-secret
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.client-authentication-method=client_secret_post
